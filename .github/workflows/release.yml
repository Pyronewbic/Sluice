name: release

# Tag a version (git tag v0.1.0 && git push --tags) -> a DRAFT GitHub release. The auto notes
# are only a scaffold (they miss commits pushed straight to main); edit them, then publish.
# GitHub attaches the source tarball automatically; the Homebrew formula + curl|sh installer
# pin to that tag. (The same tag also triggers publish-base.yml, which builds + cosign-signs
# the multi-arch GHCR base image.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create draft GitHub release
        run: gh release create "$GITHUB_REF_NAME" --draft --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

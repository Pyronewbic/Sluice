name: release

# Tag a version (git tag v0.7.0 && git push --tags) -> a DRAFT GitHub release carrying a
# deterministic source tarball, its SHA256SUMS, and a cosign keyless signature bundle. The auto
# notes are only a scaffold (they miss commits pushed straight to main); edit them, then publish.
# The Homebrew formula pins to the signed tarball asset. (The same tag also triggers
# publish-base.yml, which builds + cosign-signs the multi-arch GHCR base image.)
#
# workflow_dispatch rebuilds + reattaches the signed artifacts for an existing tag without
# touching its (already curated) notes.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "existing tag to (re)build signed artifacts for, e.g. v0.7.0"
        required: true

permissions:
  contents: write       # create the release + upload assets
  id-token: write       # cosign keyless sign-blob (Sigstore OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Build deterministic source tarball + checksums
        run: |
          v="${TAG#v}"
          tarball="sluice-${v}.tar.gz"
          # Entry mtimes come from the commit; gzip -n drops its own name/timestamp. The TAR layer is
          # therefore reproducible from the tag, but the gzip wrapper is NOT: DEFLATE differs between
          # implementations, so re-gzipping does not reproduce this sha. See SECURITY.md.
          git archive --format=tar --prefix="sluice-${v}/" "$TAG" | gzip -n9 > "$tarball"
          sha256sum "$tarball" > SHA256SUMS
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"
      - name: cosign sign-blob (keyless)
        run: cosign sign-blob --yes "$TARBALL" --bundle "${TARBALL}.cosign.bundle"
      - name: Create draft release (if missing) + attach signed artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" --draft --generate-notes --verify-tag \
            || echo "release $TAG exists - keeping its notes"
          gh release upload "$TAG" \
            "$TARBALL" "${TARBALL}.cosign.bundle" SHA256SUMS --clobber

name: release

# Tag a version (git tag v0.1.0 && git push --tags) -> a GitHub release with auto notes.
# GitHub attaches the source tarball automatically; the Homebrew formula + curl|sh installer
# pin to that tag. (Publishing a *signed* base image to GHCR - cosign + a shared base-image
# target - is a follow-up; see ROADMAP #5.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

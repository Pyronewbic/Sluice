name: nightly runtime smoke

# Build-smoke each runtime example end-to-end (build -> serve -> curl through the sandbox,
# deps pulled through the egress proxy). Heavy - real toolchains + network - so it runs
# nightly and on demand, NOT on every PR. The PR gate stays the fast egress acceptance +
# the init-detection unit tests (see acceptance.yml).
on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      runtimes:
        description: "space-separated runtimes to smoke (empty = all)"
        default: ""

permissions:
  contents: read   # least privilege: nightly smoke only reads the repo

jobs:
  runtimes:
    name: runtime build-smoke (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { submodules: recursive, persist-credentials: false }
      - name: Verify runtime examples
        env:
          RUNTIMES: ${{ github.event.inputs.runtimes }}   # empty on schedule -> all (the _want guard)
        # Each fixture is a self-contained @test (own box, in-container curl), so bats runs them
        # serially here; no host ports are published, so they never clash.
        run: test/bats/bin/bats --print-output-on-failure test/nightly-runtimes.bats

  # Each nightly-* suite builds + tears down its own box(es), so CI just calls it. Heavy (image builds)
  # -> nightly, not the PR gate. One matrix leg per suite so a failure points at the right feature.
  feature-suites:
    name: feature (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite: [lock, learn, control-plane]   # learn folds in audit; control-plane folds in ls + seams
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { submodules: recursive, persist-credentials: false }
      - name: Install grype (pinned, checksummed; for the lock --scan leg)
        if: matrix.suite == 'lock'
        run: bash scripts/install-grype.sh
      - name: Verify ${{ matrix.suite }}
        run: test/bats/bin/bats --print-output-on-failure test/nightly-${{ matrix.suite }}.bats   # python3 (for control-plane) + docker preinstalled

  # Nix builds a ~1.5GB image, so it gets its own job + a longer budget.
  nix:
    name: nix example (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { submodules: recursive, persist-credentials: false }
      - name: Verify the Nix example
        run: test/bats/bin/bats --print-output-on-failure test/nightly-nix.bats

name: acceptance

# Runs the sluice gate bats suites on Linux. The Docker job is the gate; the two Podman
# jobs are best-effort (informational): rootful proves the engine path, and rootless probes
# whether a user namespace allows the route_localnet / disable_ipv6 sysctls + in-netns
# iptables the egress proxy needs (the open ROADMAP #2 question).
on:
  push:
    branches: [main]   # branch pushes run via pull_request below; this avoids double runs
  pull_request:

jobs:
  lint:
    name: lint (shellcheck + shfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (gate)
        run: shellcheck -S warning bin/sluice   # shellcheck is preinstalled on ubuntu runners
      - name: shfmt (advisory)
        continue-on-error: true   # not yet a hard gate; `shfmt -w bin/sluice` is a separate reviewable change
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.8.0
          "$(go env GOPATH)/bin/shfmt" -d -i 2 -ci bin/sluice

  structure:
    name: base image invariants (container-structure-test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build the base stage
        run: docker build --target base -t sluice-base:gate core/
      - name: Install container-structure-test
        run: |
          curl -fsSL https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64 -o cst
          chmod +x cst && sudo mv cst /usr/local/bin/container-structure-test
      - name: Assert baked invariants (no sudo, uid 1000, firewall packages)
        run: container-structure-test test --image sluice-base:gate --config tests/structure.yaml

  detection:
    name: init detection (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Unit tests (sluice init stack detection, no Docker)
        run: test/bats/bin/bats --print-output-on-failure --report-formatter junit --output "$RUNNER_TEMP/bats" test/init-detection.bats
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-detection
          path: ${{ runner.temp }}/bats/*.xml

  install:
    name: installer smoke (no Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: install.sh symlinks + runs the CLI
        run: test/bats/bin/bats --print-output-on-failure --report-formatter junit --output "$RUNNER_TEMP/bats" test/verify-install.bats
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-install
          path: ${{ runner.temp }}/bats/*.xml

  cli:
    name: CLI surface (unit, no Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: version --json, per-command --help, parent_of, completions
        run: test/bats/bin/bats --print-output-on-failure --report-formatter junit --output "$RUNNER_TEMP/bats" test/verify-cli.bats
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-cli
          path: ${{ runner.temp }}/bats/*.xml

  docker:
    name: Linux, Docker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Acceptance tests (Docker)
        run: test/bats/bin/bats --print-output-on-failure --report-formatter junit --output "$RUNNER_TEMP/bats" test/acceptance.bats test/acceptance-bump.bats
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-docker
          path: ${{ runner.temp }}/bats/*.xml

  security:
    name: security escape-hatches (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Verify the danger knobs (allow-ips, prelaunch, state-dirs, worktree, mounts, config-hash, harden, seccomp, readonly, workspace, doh)
        run: test/bats/bin/bats --print-output-on-failure --report-formatter junit --output "$RUNNER_TEMP/bats" test/verify-security-*.bats
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-security
          path: ${{ runner.temp }}/bats/*.xml

  podman:
    name: Linux, Podman (rootful, best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Acceptance tests (rootful Podman)
        # Rootful so the sysctls apply; -E preserves PATH so bin/sluice finds podman/curl.
        run: sudo -E env SLUICE_ENGINE=podman test/bats/bin/bats --print-output-on-failure test/acceptance.bats test/acceptance-bump.bats

  podman-rootless:
    name: Linux, Podman (rootless, best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install + configure rootless podman
        run: |
          sudo apt-get update && sudo apt-get install -y podman uidmap slirp4netns
          # subuid/subgid for the unprivileged runner user (the user namespace needs them).
          u="$(id -un)"
          grep -q "^$u:" /etc/subuid || echo "$u:100000:65536" | sudo tee -a /etc/subuid
          grep -q "^$u:" /etc/subgid || echo "$u:100000:65536" | sudo tee -a /etc/subgid
          podman system migrate || true
          echo "rootless: $(podman info --format '{{.Host.Security.Rootless}}' 2>/dev/null)"
      - name: Acceptance tests (rootless Podman)
        # No sudo: runs in the user namespace. The egress proxy needs route_localnet /
        # disable_ipv6 sysctls + in-netns iptables - this job reports whether rootless allows
        # them. The egress allow/deny/IPv6/non-root matrix is the signal.
        run: SLUICE_ENGINE=podman test/bats/bin/bats --print-output-on-failure test/acceptance.bats test/acceptance-bump.bats

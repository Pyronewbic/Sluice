name: publish base image

# One build, evaluated then promoted - the published bytes are always the evaluated bytes. Every run
# builds+pushes the multi-arch base ONCE to a throwaway :candidate digest, structure-tests both arches
# and scans that exact digest, and only then re-tags it (imagetools create, no rebuild) onto the real
# tags. Two modes, one signing identity (this file at refs/tags/v* or refs/heads/main - the launcher
# pins exactly these two refs of exactly this workflow):
#
#   release (a v* TAG PUSH): promote the evaluated digest to :<tag> AND :latest, sign + attest. No scan
#     gate - release day moves :latest unconditionally (the human override). A workflow_dispatch from a
#     tag ref is REFUSED (it would repush a frozen version tag); dispatch from a branch to refresh.
#
#   refresh (weekly schedule / branch dispatch): promote to :latest ONLY if scripts/base-scan-gate.sh
#     rules the candidate purl-different and no worse than the published :latest at every severity tier.
#     Identical inventory skips; a worse scan or an unevaluable gate fails the job (fail closed). Version
#     tags stay frozen.
#
# The refresh exists because the base used to fossilize between releases: rolling Wolfi ships CVE
# fixes continuously (a gh rebuilt against a patched grpc, a fixed libnghttp2) that a tag-only
# :latest never picked up, so the published base scanned worse than a fresh local build.
# NOTE: after the first publish, set the GHCR package to Public (one-time, in the package settings).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"   # Mondays 05:00 UTC - the weekly gated refresh

permissions:
  contents: read
  packages: write       # push to GHCR
  id-token: write       # cosign keyless signing (Sigstore OIDC)

concurrency:
  group: publish-base   # a tag release and a weekly refresh serialize, never interleave
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/pyronewbic/sluice-base

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # the arm64 leg runs the find / invariant walk under qemu (slow, not stuck)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v3.7.0 (arm64 emulation for build + structure test)
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mode (release on a v* tag, refresh on schedule/dispatch)
        id: mode
        env:
          EVENT: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          # A workflow_dispatch can be launched FROM a tag ref; keying release on ref_type alone would
          # then run ungated release mode and force-repush the frozen version tag. Refuse it outright.
          if [ "$EVENT" = workflow_dispatch ] && [ "$REF_TYPE" = tag ]; then
            echo "::error::manual dispatch from a tag ref would repush a frozen version tag - refusing (dispatch from a branch to refresh)"
            exit 1
          fi
          # Release only on an actual TAG PUSH; schedule and branch dispatch are gated refreshes.
          if [ "$EVENT" = push ] && [ "$REF_TYPE" = tag ]; then echo "mode=release"; else echo "mode=refresh"; fi >> "$GITHUB_OUTPUT"

      # --- build + push the multi-arch base ONCE to a throwaway :candidate pointer, capturing the index
      #     digest. Every gate below evaluates THIS exact digest; :latest / :vX are only re-tagged onto it
      #     after all gates pass (promote step). The old flow built a :smoke image, tested THAT, then did a
      #     SECOND from-scratch rebuild to push - so the published bytes were never the evaluated bytes. ---
      - name: Build + push the candidate (multi-arch, by digest; retried)
        id: candidate
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if timeout 900 docker buildx build --platform linux/amd64,linux/arm64 --target base \
                 --build-arg VCS_REF="$GITHUB_SHA" \
                 -t "${IMAGE}:candidate" --push --metadata-file cand-meta.json core/; then
              d="$(jq -r '."containerimage.digest" // empty' cand-meta.json)"
              case "$d" in sha256:*) echo "digest=$d" >> "$GITHUB_OUTPUT"; exit 0 ;; esac
              echo "::error::candidate push produced no digest - refusing to evaluate blind"; exit 1
            fi
            echo "::warning::candidate build/push attempt $i failed or timed out; retrying"
            sleep $((i * 10))
          done
          echo "::error::candidate build/push failed after 3 attempts"; exit 1
      - name: Install container-structure-test (pinned, checksummed)
        run: bash scripts/install-cst.sh
      - name: Assert base invariants on the PUSHED digest (amd64 + arm64)
        # Same spec the PR gate runs (no sudo, uid 1000, firewall packages, keyless) - now against the
        # exact bytes that will be promoted, not a sibling build. amd64 is the host platform (a plain
        # digest pull resolves to it); arm64 is the sibling manifest by its own digest, tested under qemu.
        env:
          DIGEST: ${{ steps.candidate.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE}@${DIGEST}"
          container-structure-test test --image "${IMAGE}@${DIGEST}" --config test/structure.yaml
          arm="$(docker buildx imagetools inspect "${IMAGE}@${DIGEST}" --format '{{json .}}' \
                 | jq -r '.manifest.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest')"
          case "$arm" in sha256:*) ;; *) echo "::error::no arm64 manifest in the pushed index"; exit 1 ;; esac
          docker pull "${IMAGE}@${arm}"
          container-structure-test test --image "${IMAGE}@${arm}" --config test/structure.yaml

      # --- the candidate SBOM: attest predicate + the refresh gate share it. From the pushed amd64 image
      #     (pulled above); the apk/npm set is arch-invariant (only the purl arch qualifier differs). ---
      - name: Generate base SBOM (from the pushed amd64 image)
        env:
          DIGEST: ${{ steps.candidate.outputs.digest }}
        run: bin/sluice __sbom "${IMAGE}@${DIGEST}" > base.cdx.json

      # --- refresh mode only: the scan gate against the published :latest ---
      - name: Pull the published :latest (refresh baseline, retried)
        if: steps.mode.outputs.mode == 'refresh'
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if docker pull "${IMAGE}:latest"; then exit 0; fi
            echo "::warning::pull of ${IMAGE}:latest attempt $i failed; retrying"
            sleep $((i * 10))
          done
          echo "::error::cannot pull ${IMAGE}:latest - refusing to refresh blind"
          exit 1
      - name: Install grype (pinned, checksummed)
        if: steps.mode.outputs.mode == 'refresh'
        run: bash scripts/install-grype.sh
      - name: Scan gate (push only if no worse than the published base)
        id: gate
        if: steps.mode.outputs.mode == 'refresh'
        env:
          DIGEST: ${{ steps.candidate.outputs.digest }}
        run: |
          set -euo pipefail
          # Inventory identity comes from the sluice SBOMs; severity comes from scanning the IMAGES.
          # Never scan the sbom: - the six-ecosystem SBOM lists gh as one apk package, so it is blind
          # to go-module CVEs vendored inside it (grype's syft catalog of the image sees them). The
          # candidate side scans the exact pushed digest that will be promoted.
          bin/sluice __sbom "${IMAGE}:latest" > current.cdx.json
          grype "docker:${IMAGE}@${DIGEST}" -o json > cand.grype.json
          grype "docker:${IMAGE}:latest"    -o json > cur.grype.json
          rc=0; scripts/base-scan-gate.sh base.cdx.json current.cdx.json cand.grype.json cur.grype.json || rc=$?
          case "$rc" in
            0) echo "push=yes" >> "$GITHUB_OUTPUT" ;;
            2) echo "::notice::scan gate SKIP - inventory identical to the published :latest"
               echo "push=no" >> "$GITHUB_OUTPUT" ;;
            3) echo "::error::scan gate REFUSE - the candidate scans worse than the published :latest"
               exit 3 ;;
            *) echo "::error::scan gate could not evaluate (rc=$rc) - failing closed"
               exit "$rc" ;;
          esac

      - name: Decide push (release always; refresh only on a gate PUSH)
        id: decide
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          GATE_PUSH: ${{ steps.gate.outputs.push }}
        run: |
          set -euo pipefail
          if [ "$MODE" = release ]; then echo "push=yes"; else echo "push=${GATE_PUSH:-no}"; fi >> "$GITHUB_OUTPUT"

      # --- promote the EVALUATED candidate digest to the real tags by re-tagging (imagetools create
      #     copies no bytes and rebuilds nothing) - so :latest always points at bytes that passed every
      #     gate above. Refresh moves :latest only; release moves :latest AND the frozen version tag. ---
      - name: Promote the evaluated digest
        id: push
        if: steps.decide.outputs.push == 'yes'
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          REF_NAME: ${{ github.ref_name }}
          DIGEST: ${{ steps.candidate.outputs.digest }}
        run: |
          set -euo pipefail
          if [ "$MODE" = release ]; then
            docker buildx imagetools create -t "${IMAGE}:${REF_NAME}" -t "${IMAGE}:latest" "${IMAGE}@${DIGEST}"
          else
            docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}@${DIGEST}"
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: cosign sign (keyless)
        if: steps.decide.outputs.push == 'yes'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      - name: cosign attest (CycloneDX SBOM)
        if: steps.decide.outputs.push == 'yes'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign attest --yes --type cyclonedx --predicate base.cdx.json "${IMAGE}@${DIGEST}"
      - name: cosign verify + verify-attestation (sanity, against the exact pushed digest)
        if: steps.decide.outputs.push == 'yes'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp='^https://github\.com/Pyronewbic/Sluice/\.github/workflows/publish-base\.yml@(refs/tags/v|refs/heads/main$)'
          cosign verify-attestation --type cyclonedx "${IMAGE}@${DIGEST}" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp='^https://github\.com/Pyronewbic/Sluice/\.github/workflows/publish-base\.yml@(refs/tags/v|refs/heads/main$)' >/dev/null

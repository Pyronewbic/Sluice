# sluice egress filter. Squid in transparent-intercept mode: allow by HOSTNAME, splice
# (pass through, NEVER decrypt) allowed TLS. iptables REDIRECTs tcp/80 -> 3129, 443 -> 3130.
visible_hostname sluice

# An intercepted request's Host/SNI must resolve to the IP the client actually connected to. Without
# this (squid's default is `off`), a uid-1000 process could send `Host: <allowlisted>` over plaintext
# HTTP while connecting to an ARBITRARY IP: dstdomain matches the forged Host and squid would forward to
# that IP - exfil straight past the by-domain gate. The shared dnsmasq cache (min-cache-ttl=3600) keeps
# the client's and squid's lookups aligned, so legit allowlisted hosts still match.
host_verify_strict on

# --- ports ---------------------------------------------------------------------
# 3128: a forward-proxy port on loopback that squid requires (it refuses intercept-only). It is NOT a
# filtered path - a CONNECT here would blind-tunnel to any IP - so it is denied outright below (and the
# firewall also REJECTs non-squid traffic to it). Real egress is intercepted on 3129/3130.
http_port  127.0.0.1:3128
http_port  0.0.0.0:3129 intercept
# ssl-bump to read the SNI; we only splice (never forge), so the cert is never used to MITM.
https_port 0.0.0.0:3130 intercept ssl-bump \
  tls-cert=/etc/squid/ssl/squid-cert.pem tls-key=/etc/squid/ssl/squid-key.pem \
  generate-host-certificates=off

# --- the allowlist (one host per line; a leading dot matches subdomains) --------
acl allowed_host dstdomain        "/etc/squid/allowlist.txt"
acl allowed_sni  ssl::server_name "/etc/squid/allowlist.txt"
acl ssl_tunnel   method CONNECT
# The forward-proxy listener (3128) is not an intercept path: nothing arriving on it is filtered, so it
# is denied wholesale. Keys on the local listener port, so it cannot affect the 3129/3130 intercepts.
acl fwd_port     localport 3128

# --- HTTPS: peek the ClientHello for the SNI, splice if allowed, else terminate --
# No decryption happens: splice = transparent pass-through once the SNI is known.
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump splice allowed_sni
ssl_bump terminate all

# --- authorization (ssl_bump is the real HTTPS gate; HTTP filtered by Host) -----
http_access deny fwd_port          # first: the forward-proxy port tunnels nothing (closes the CONNECT bypass)
http_access allow ssl_tunnel
http_access allow allowed_host
http_access deny all

# --- we are a filter, not a cache ----------------------------------------------
cache deny all
# No TLS session cache (we only splice; also avoids squid's shm_open, which fails in containers).
sslproxy_session_cache_size 0 MB
cache_effective_user squid
pid_filename none                 # single instance per container, managed by the entrypoint
# Log the SNI so `sluice learn` can recover blocked hostnames (else only the IP is logged).
# tx/rx (bytes from/to the client = the box) feed the per-host data-volume in the egress receipt.
logformat sluice %ts.%03tu %>a %Ss/%03>Hs %rm %ru ssl_sni=%ssl::>sni tx=%>st rx=%<st
access_log stdio:/var/log/squid/access.log sluice
cache_log /var/log/squid/cache.log
# Quieten: no client connecting through us is a "client" we cache for.
shutdown_lifetime 1 second

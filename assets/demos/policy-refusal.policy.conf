# Org egress policy - the line a developer's local sluice.config.sh CANNOT loosen.
# In production this is /etc/sluice/policy.conf (root-owned, pushed via MDM) or a signed
# SLUICE_POLICY_URL; this demo models it with a file:// SLUICE_POLICY_URL. deny is FINAL.
deny    metadata.example.internal      # no egress to the internal metadata host, ever
deny-ip 169.254.169.254/32             # and never the cloud-metadata IP (the SSRF crown jewel)
